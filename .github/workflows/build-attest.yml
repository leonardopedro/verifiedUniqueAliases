name: Build VM Image and Attest

on:
  push:
    branches: [main, l-branch-1]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Rust Binary
        run: |
          docker build --no-cache --load --target rust-builder -f Dockerfile.repro -t rust-builder .
          CONTAINER_ID=$(docker create rust-builder)
          docker cp $CONTAINER_ID:/paypal-auth-vm-bin ./paypal-auth-vm.bin
          docker rm $CONTAINER_ID

      - name: Attest Enclave Binary
        uses: actions/attest-build-provenance@v2
        id: attest_binary
        with:
          subject-name: paypal-auth-vm.bin
          subject-path: paypal-auth-vm.bin

      - name: Inject Attestation and Complete Synthesis
        run: |
          # Inject the sigstore provenance bundle so the enclave can serve it
          cp ${{ steps.attest_binary.outputs.bundle-path }} ./github_attestation.jsonl
          
          docker build --no-cache --load --target image-builder -f Dockerfile.repro -t paypal-auth-vm .
          CONTAINER_ID=$(docker create paypal-auth-vm)
          docker cp $CONTAINER_ID:/disk.tar.gz ./disk.tar.gz
          docker cp $CONTAINER_ID:/initramfs-paypal-auth.img ./initramfs.img
          docker cp $CONTAINER_ID:/packages.txt ./packages.txt
          docker rm $CONTAINER_ID
          echo "==== ARTIFACT HASHES ===="
          sha256sum paypal-auth-vm.bin disk.tar.gz initramfs.img
          echo "========================="
          echo "==== PACKAGE MANIFEST ===="
          cat packages.txt
          echo "=========================="

      - name: Attest disk.tar.gz
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: VM disk image
          subject-path: disk.tar.gz

      - name: Attest initramfs
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: initramfs image
          subject-path: initramfs.img

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vm-artifacts
          path: |
            disk.tar.gz
            initramfs.img
          retention-days: 7