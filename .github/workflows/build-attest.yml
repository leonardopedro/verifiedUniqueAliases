name: Build VM Image and Attest

on:
  push:
    branches: [main, l-branch-1]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build and extract artifacts
        run: |
          docker build --no-cache --load --target image-builder -f Dockerfile.repro -t paypal-auth-vm .
          CONTAINER_ID=$(docker create paypal-auth-vm)
          docker cp $CONTAINER_ID:/build/paypal-auth-vm-bin ./paypal-auth-vm.bin
          docker cp $CONTAINER_ID:/build/output/vmlinuz ./vmlinuz
          docker cp $CONTAINER_ID:/build/output/initramfs-paypal-auth.img ./initramfs.img
          docker cp $CONTAINER_ID:/build/output/shimx64.efi ./shimx64.efi
          docker cp $CONTAINER_ID:/build/output/grubx64.efi ./grubx64.efi
          docker cp $CONTAINER_ID:/grub.cfg ./grub.cfg
          docker cp $CONTAINER_ID:/disk.tar.gz ./disk.tar.gz
          docker cp $CONTAINER_ID:/packages.txt ./packages.txt
          docker rm $CONTAINER_ID
          echo "==== ARTIFACT HASHES ===="
          sha256sum paypal-auth-vm.bin vmlinuz initramfs.img shimx64.efi grubx64.efi grub.cfg disk.tar.gz
          echo "========================="

      - name: Attest Enclave Binary
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: Enclave Binary
          subject-path: paypal-auth-vm.bin

      - name: Attest Kernel
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: Linux Kernel
          subject-path: vmlinuz

      - name: Attest Initrd
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: Initramfs
          subject-path: initramfs.img

      - name: Attest Bootloader
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: EFI Bootloader
          subject-path: |
            shimx64.efi
            grubx64.efi
            grub.cfg

      - name: Attest VM Disk Image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: VM Disk Image
          subject-path: disk.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vm-artifacts
          path: |
            disk.tar.gz
            initramfs.img
            vmlinuz
          retention-days: 7