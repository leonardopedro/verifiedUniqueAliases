name: Build VM Image and Attest

on:
  push:
    branches: [main, l-branch-1]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build and extract artifacts
        run: |
          docker build --load --target image-builder -f Dockerfile.repro -t paypal-auth-vm .
          CONTAINER_ID=$(docker create paypal-auth-vm)
          docker cp $CONTAINER_ID:/disk.tar.gz ./disk.tar.gz
          docker cp $CONTAINER_ID:/initramfs-paypal-auth.img ./initramfs.img
          docker rm $CONTAINER_ID

      - name: Attest disk.tar.gz
        uses: actions/attest@v2
        with:
          subject-name: VM disk image
          subject-path: disk.tar.gz

      - name: Attest initramfs
        uses: actions/attest@v2
        with:
          subject-name: initramfs image
          subject-path: initramfs.img

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vm-artifacts
          path: |
            disk.tar.gz
            initramfs.img
          retention-days: 7