services:
  paypal-auth:
    image: fra.ocir.io/fronpbp0mpan/paypal-auth-vm:latest
    ports:
      - "443:443"
      - "80:80"
    environment:
      # These will be mapped from the host or supplied by dstack KMS
      PAYPAL_CLIENT_ID: "${PAYPAL_CLIENT_ID}"
      DOMAIN: "${DOMAIN}"
      # For Flashbots dstack, the Guest Agent handles secrets via /var/run/tappd.sock
    volumes:
      - /run/tappd.sock:/run/tappd.sock
